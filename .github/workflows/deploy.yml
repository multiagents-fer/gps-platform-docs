name: Deploy Docs to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: gps-platform-docs
  # Update this after terraform apply creates the distribution
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npm run docs:build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::511808112721:role/gps-platform-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # HTML files: no-cache for fresh content
          aws s3 sync docs/.vitepress/dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "public, max-age=0, must-revalidate"

          # Hashed assets: immutable cache
          aws s3 sync docs/.vitepress/dist/assets/ s3://${{ env.S3_BUCKET }}/assets/ \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
